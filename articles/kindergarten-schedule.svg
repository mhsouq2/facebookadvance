<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of colorful alphabet and number blocks with a small clock representing a kindergarten daily schedule">
  <rect width="400" height="250" fill="#EAF3FB"/>
  <circle cx="50" cy="50" r="34" fill="#FFB300" opacity="0.18"/>
  <circle cx="360" cy="200" r="40" fill="#43A047" opacity="0.12"/>
  <g><rect x="80" y="120" width="64" height="64" rx="10" fill="#2E7D32"/><text x="112" y="164" font-family="Poppins, sans-serif" font-size="34" font-weight="700" fill="#FFFFFF" text-anchor="middle">A</text></g>
  <g><rect x="156" y="100" width="64" height="64" rx="10" fill="#FFB300"/><text x="188" y="144" font-family="Poppins, sans-serif" font-size="34" font-weight="700" fill="#1D2A22" text-anchor="middle">B</text></g>
  <g><rect x="232" y="124" width="64" height="64" rx="10" fill="#1976D2"/><text x="264" y="168" font-family="Poppins, sans-serif" font-size="32" font-weight="700" fill="#FFFFFF" text-anchor="middle">1</text></g>
