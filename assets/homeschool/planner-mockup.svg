<svg viewBox="0 0 520 420" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of an open homeschool weekly planner with a checklist and pencil">
  <rect width="520" height="420" rx="24" fill="#FFFFFF" opacity="0.0"/>
  <!-- shadow base -->
  <ellipse cx="260" cy="368" rx="190" ry="20" fill="#0B1F12" opacity="0.18"/>

  <!-- planner cover back -->
  <rect x="60" y="70" width="400" height="280" rx="14" fill="#1B5E20"/>

  <!-- left page -->
  <path d="M70 86 L256 78 L256 330 L70 338 Z" fill="#FFFFFF"/>
  <!-- right page -->
  <path d="M264 78 L450 86 L450 338 L264 330 Z" fill="#F7F9FA"/>
  <!-- spine -->
  <rect x="256" y="78" width="8" height="256" fill="#D8E3D9"/>

  <!-- left page header -->
  <rect x="92" y="108" width="120" height="14" rx="7" fill="#2E7D32"/>
  <rect x="92" y="132" width="80" height="8" rx="4" fill="#C7D8C9"/>

  <!-- left page checklist -->
  <g font-family="Inter, sans-serif">
    <rect x="92" y="158" width="18" height="18" rx="5" fill="#FFFFFF" stroke="#2E7D32" stroke-width="2"/>
    <path d="M96 167 l4 4 8 -9" stroke="#2E7D32" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="120" y="162" width="90" height="8" rx="4" fill="#D8E3D9"/>

    <rect x="92" y="190" width="18" height="18" rx="5" fill="#FFFFFF" stroke="#2E7D32" stroke-width="2"/>
    <path d="M96 199 l4 4 8 -9" stroke="#2E7D32" stroke-width="2.4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="120" y="194" width="100" height="8" rx="4" fill="#D8E3D9"/>

    <rect x="92" y="222" width="18" height="18" rx="5" fill="#FFFFFF" stroke="#FFB300" stroke-width="2"/>
    <rect x="120" y="226" width="70" height="8" rx="4" fill="#E9EFEA"/>

    <rect x="92" y="254" width="18" height="18" rx="5" fill="#FFFFFF" stroke="#43A047" stroke-width="2"/>
    <rect x="120" y="258" width="95" height="8" rx="4" fill="#E9EFEA"/>

    <rect x="92" y="286" width="18" height="18" rx="5" fill="#FFFFFF" stroke="#1976D2" stroke-width="2"/>
    <rect x="120" y="290" width="80" height="8" rx="4" fill="#E9EFEA"/>
  </g>

  <!-- right page calendar grid -->
  <rect x="286" y="108" width="146" height="16" rx="8" fill="#FFB300"/>
  <g>
    <rect x="286" y="140" width="146" height="160" rx="10" fill="#FFFFFF" stroke="#E1E8E3" stroke-width="2"/>
    <line x1="306" y1="140" x2="306" y2="300" stroke="#EEF1EF" stroke-width="2"/>
    <line x1="332" y1="140" x2="332" y2="300" stroke="#EEF1EF" stroke-width="2"/>
    <line x1="358" y1="140" x2="358" y2="300" stroke="#EEF1EF" stroke-width="2"/>
    <line x1="384" y1="140" x2="384" y2="300" stroke="#EEF1EF" stroke-width="2"/>
    <line x1="410" y1="140" x2="410" y2="300" stroke="#EEF1EF" stroke-width="2"/>
    <line x1="286" y1="170" x2="432" y2="170" stroke="#EEF1EF" stroke-width="2"/>
    <line x1="286" y1="200" x2="432" y2="200" stroke="#EEF1EF" stroke-width="2"/>
    <line x1="286" y1="230" x2="432" y2="230" stroke="#EEF1EF" stroke-width="2"/>
    <line x1="286" y1="260" x2="432" y2="260" stroke="#EEF1EF" stroke-width="2"/>
    <circle cx="345" cy="215" r="11" fill="#43A047"/>
    <circle cx="397" cy="245" r="11" fill="#1976D2" opacity="0.85"/>
  </g>

  <!-- pencil across planner -->
  <rect x="150" y="350" width="14" height="92" rx="5" fill="#FFB300" transform="rotate(-28 157 396)"/>
  <path d="M147 432 l14 8 -18 10 z" fill="#2E7D32" transform="rotate(-28 157 396)"/>
  <rect x="150" y="350" width="14" height="14" rx="3" fill="#2E7D32" transform="rotate(-28 157 396)"/>

  <!-- paperclip / bookmark ribbon -->
  <path d="M250 70 L250 130 L262 118 L274 130 L274 70 Z" fill="#43A047"/>
</svg>
