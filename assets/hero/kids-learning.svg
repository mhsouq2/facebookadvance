<svg viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of a teacher helping two children with a worksheet at a classroom table">
  <defs>
    <linearGradient id="heroBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EAF6EA"/>
      <stop offset="100%" stop-color="#F7F9FA"/>
    </linearGradient>
  </defs>
  <rect width="640" height="480" rx="28" fill="url(#heroBg)"/>

  <!-- sun -->
  <circle cx="552" cy="78" r="34" fill="#FFB300" opacity="0.9"/>
  <circle cx="552" cy="78" r="50" fill="#FFB300" opacity="0.12"/>

  <!-- shelf -->
  <rect x="60" y="60" width="150" height="14" rx="7" fill="#43A047" opacity="0.25"/>
  <rect x="70" y="20" width="26" height="44" rx="4" fill="#1976D2"/>
  <rect x="100" y="14" width="26" height="50" rx="4" fill="#2E7D32"/>
  <rect x="130" y="24" width="26" height="40" rx="4" fill="#FFB300"/>
  <circle cx="195" cy="40" r="16" fill="#43A047"/>

  <!-- plant -->
  <rect x="552" y="380" width="30" height="40" rx="6" fill="#C8D8C9"/>
  <path d="M567 380 C540 360 540 320 567 300 C594 320 594 360 567 380Z" fill="#43A047"/>
  <path d="M567 380 C547 365 547 335 567 318 C587 335 587 365 567 380Z" fill="#2E7D32"/>

  <!-- table -->
  <rect x="120" y="330" width="400" height="22" rx="10" fill="#D9CBB1"/>
  <rect x="140" y="352" width="20" height="70" rx="6" fill="#C9B996"/>
  <rect x="480" y="352" width="20" height="70" rx="6" fill="#C9B996"/>

  <!-- open book on table -->
  <path d="M260 300 L320 290 L380 300 L380 335 L320 327 L260 335 Z" fill="#FFFFFF" stroke="#43A047" stroke-width="3"/>
  <line x1="320" y1="290" x2="320" y2="327" stroke="#43A047" stroke-width="3"/>
  <line x1="270" y1="305" x2="305" y2="300" stroke="#A9C8AB" stroke-width="3" stroke-linecap="round"/>
  <line x1="270" y1="316" x2="305" y2="311" stroke="#A9C8AB" stroke-width="3" stroke-linecap="round"/>
  <line x1="335" y1="300" x2="370" y2="305" stroke="#A9C8AB" stroke-width="3" stroke-linecap="round"/>
  <line x1="335" y1="311" x2="370" y2="316" stroke="#A9C8AB" stroke-width="3" stroke-linecap="round"/>

  <!-- pencil -->
  <rect x="395" y="318" width="12" height="60" rx="4" fill="#FFB300" transform="rotate(20 401 348)"/>
  <path d="M404 372 l10 6 -16 8 z" fill="#2E7D32" transform="rotate(20 401 348)"/>

  <!-- teacher (standing, center-left) -->
  <g>
    <circle cx="200" cy="210" r="34" fill="#F2C9A0"/>
    <path d="M170 200 Q200 168 230 200 L228 196 Q200 178 172 196 Z" fill="#5A3D2B"/>
    <path d="M150 330 Q150 250 200 246 Q250 250 250 330 Z" fill="#1976D2"/>
    <rect x="178" y="246" width="44" height="40" rx="14" fill="#F2C9A0"/>
    <circle cx="190" cy="208" r="3" fill="#3A2A20"/>
    <circle cx="210" cy="208" r="3" fill="#3A2A20"/>
    <path d="M192 222 Q200 228 208 222" stroke="#3A2A20" stroke-width="2.4" fill="none" stroke-linecap="round"/>
  </g>

  <!-- child 1 (seated left at table) -->
  <g>
    <circle cx="290" cy="270" r="26" fill="#F6D7B0"/>
    <path d="M266 262 Q290 234 314 262 Q300 248 290 250 Q280 248 266 262Z" fill="#7A4B2E"/>
    <path d="M268 330 Q268 282 290 280 Q312 282 312 330 Z" fill="#43A047"/>
    <circle cx="282" cy="270" r="2.6" fill="#3A2A20"/>
    <circle cx="298" cy="270" r="2.6" fill="#3A2A20"/>
    <path d="M282 282 Q290 287 298 282" stroke="#3A2A20" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- child 2 (seated right at table) -->
  <g>
    <circle cx="420" cy="272" r="26" fill="#E7B98B"/>
    <path d="M398 264 Q420 238 442 264 Q428 252 420 252 Q412 252 398 264Z" fill="#1A1A1A"/>
    <path d="M398 330 Q398 284 420 282 Q442 284 442 330 Z" fill="#FFB300"/>
    <circle cx="412" cy="272" r="2.6" fill="#3A2A20"/>
    <circle cx="428" cy="272" r="2.6" fill="#3A2A20"/>
    <path d="M412 284 Q420 289 428 284" stroke="#3A2A20" stroke-width="2" fill="none" stroke-linecap="round"/>
  </g>

  <!-- floating decorative icons -->
  <g opacity="0.85">
    <circle cx="120" cy="150" r="20" fill="#FFFFFF"/>
    <text x="120" y="158" font-family="Poppins, sans-serif" font-size="20" text-anchor="middle" fill="#2E7D32" font-weight="700">A</text>
  </g>
  <g opacity="0.85">
    <circle cx="500" cy="220" r="20" fill="#FFFFFF"/>
    <text x="500" y="228" font-family="Poppins, sans-serif" font-size="18" text-anchor="middle" fill="#1976D2" font-weight="700">123</text>
  </g>
  <g opacity="0.85">
    <circle cx="80" cy="400" r="18" fill="#FFFFFF"/>
    <path d="M72 402 l6 6 12 -14" stroke="#FFB300" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  </g>
</svg>
